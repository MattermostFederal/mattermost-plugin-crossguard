openapi: 3.1.0
info:
  title: Cross Guard Message API
  description: >
    Defines the message envelope, payload schemas, and connection
    configuration used by the Cross Guard plugin to relay events between
    Mattermost instances. Messages are transported over NATS or Azure
    Queue Storage depending on the connection's `provider` setting. The
    wire format (JSON or XML) is controlled by the outbound connection's
    `message_format` setting. Inbound messages are auto-detected by
    inspecting the first non-whitespace byte. XML element names and
    namespace are defined in `crossguard.xsd`.
  version: 1.1.0
  contact:
    name: Mattermost Federal

# These paths model logical message operations, not HTTP endpoints.
# NATS connections use pub/sub directly; Azure connections use Queue
# Storage with polling-based delivery.
paths:
  /publish:
    post:
      operationId: publishMessage
      summary: Publish a message to an outbound connection
      description: >
        Represents the act of publishing a Cross Guard message envelope to
        an outbound connection. For NATS, this publishes to the configured
        subject (e.g. `crossguard.high`). For Azure Queue Storage, the
        message is Base64-encoded and enqueued. The transport is determined
        by the connection's `provider` setting.
      x-nats-subject: "crossguard.{domain}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEnvelope"
          application/xml:
            schema:
              $ref: "#/components/schemas/MessageEnvelope"
      responses:
        "200":
          description: Message accepted by the transport provider.

  /subscribe:
    post:
      operationId: subscribeMessage
      summary: Receive a message from an inbound connection
      description: >
        Represents the receipt of a Cross Guard message envelope on an
        inbound connection. For NATS, messages arrive via subscription
        callback. For Azure Queue Storage, messages are dequeued via
        polling (5-second interval). The format (JSON or XML) is
        auto-detected on receipt regardless of provider.
      x-nats-subject: "crossguard.{domain}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEnvelope"
          application/xml:
            schema:
              $ref: "#/components/schemas/MessageEnvelope"
      responses:
        "200":
          description: Message processed by the receiving plugin instance.

components:
  schemas:
    # ------------------------------------------------------------------
    # Envelope
    # ------------------------------------------------------------------
    MessageEnvelope:
      type: object
      description: >
        Standard envelope that wraps every relayed message. Exactly one
        payload field is present per message. The envelope is serialized
        as JSON or XML depending on the outbound connection's
        message_format setting. Inbound messages are auto-detected by
        first non-whitespace byte (< for XML, otherwise JSON). The
        envelope format is identical regardless of transport provider.
      required:
        - type
        - timestamp
      properties:
        type:
          $ref: "#/components/schemas/MessageType"
        timestamp:
          type: string
          format: date-time
          description: UTC timestamp in RFC 3339 format indicating when the message was created.
          examples:
            - "2026-03-27T14:30:00Z"
        post_message:
          $ref: "#/components/schemas/PostMessage"
          description: >
            Present when type is `crossguard_post` or `crossguard_update`.
        delete_message:
          $ref: "#/components/schemas/DeleteMessage"
          description: >
            Present when type is `crossguard_delete`.
        reaction_message:
          $ref: "#/components/schemas/ReactionMessage"
          description: >
            Present when type is `crossguard_reaction_add` or
            `crossguard_reaction_remove`.
        test_message:
          $ref: "#/components/schemas/TestMessage"
          description: >
            Present when type is `crossguard_test`.

    # ------------------------------------------------------------------
    # Message type enum
    # ------------------------------------------------------------------
    MessageType:
      type: string
      description: Discriminator that identifies the payload schema inside the envelope.
      enum:
        - crossguard_post
        - crossguard_update
        - crossguard_delete
        - crossguard_reaction_add
        - crossguard_reaction_remove
        - crossguard_test
      x-enum-descriptions:
        crossguard_post: A new post was created.
        crossguard_update: An existing post was edited.
        crossguard_delete: A post was deleted.
        crossguard_reaction_add: A reaction was added to a post.
        crossguard_reaction_remove: A reaction was removed from a post.
        crossguard_test: A connectivity test message.

    # ------------------------------------------------------------------
    # Payloads
    # ------------------------------------------------------------------
    PostMessage:
      type: object
      description: >
        Payload for `crossguard_post` and `crossguard_update` message types.
        For updates, the fields reflect the post state after the edit.
      required:
        - post_id
        - channel_id
        - channel_name
        - team_id
        - team_name
        - user_id
        - username
        - message
        - create_at
      properties:
        post_id:
          type: string
          description: Unique identifier of the post on the originating server.
          examples:
            - "8swgtrrdiff89yj1z33pofo15r"
        root_id:
          type: string
          description: >
            If this post is a threaded reply, the ID of the root post.
            Omitted for top-level posts.
          examples:
            - "nzwq4p3jkbysfmh3e3x4151n5o"
        channel_id:
          type: string
          description: ID of the channel the post belongs to on the originating server.
          examples:
            - "9a1f4h6e17yfmk9w6pxs3jqd3e"
        channel_name:
          type: string
          description: URL-safe name of the channel (used for cross-domain resolution).
          examples:
            - "town-square"
        team_id:
          type: string
          description: ID of the team on the originating server.
          examples:
            - "5f3h8k2m41ygdj7w8pxr6nqb9c"
        team_name:
          type: string
          description: URL-safe name of the team (used for cross-domain resolution).
          examples:
            - "test-a"
        user_id:
          type: string
          description: ID of the user who authored the post on the originating server.
          examples:
            - "7m4k9j2p63ynfr8x1qwt5hab4e"
        username:
          type: string
          description: Username of the post author.
          examples:
            - "alice"
        message:
          type: string
          description: The Markdown-formatted message body of the post.
          examples:
            - "Hello from the other side"
        create_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the post was originally created.
          examples:
            - 1711547400000

    DeleteMessage:
      type: object
      description: Payload for the `crossguard_delete` message type.
      required:
        - post_id
        - channel_id
        - channel_name
        - team_id
        - team_name
      properties:
        post_id:
          type: string
          description: Unique identifier of the deleted post on the originating server.
          examples:
            - "8swgtrrdiff89yj1z33pofo15r"
        channel_id:
          type: string
          description: ID of the channel the post belonged to.
          examples:
            - "9a1f4h6e17yfmk9w6pxs3jqd3e"
        channel_name:
          type: string
          description: URL-safe name of the channel.
          examples:
            - "town-square"
        team_id:
          type: string
          description: ID of the team on the originating server.
          examples:
            - "5f3h8k2m41ygdj7w8pxr6nqb9c"
        team_name:
          type: string
          description: URL-safe name of the team.
          examples:
            - "test-a"

    ReactionMessage:
      type: object
      description: >
        Payload for `crossguard_reaction_add` and `crossguard_reaction_remove`
        message types.
      required:
        - post_id
        - channel_id
        - channel_name
        - team_id
        - team_name
        - user_id
        - username
        - emoji_name
      properties:
        post_id:
          type: string
          description: ID of the post the reaction applies to.
          examples:
            - "8swgtrrdiff89yj1z33pofo15r"
        channel_id:
          type: string
          description: ID of the channel containing the post.
          examples:
            - "9a1f4h6e17yfmk9w6pxs3jqd3e"
        channel_name:
          type: string
          description: URL-safe name of the channel.
          examples:
            - "town-square"
        team_id:
          type: string
          description: ID of the team on the originating server.
          examples:
            - "5f3h8k2m41ygdj7w8pxr6nqb9c"
        team_name:
          type: string
          description: URL-safe name of the team.
          examples:
            - "test-a"
        user_id:
          type: string
          description: ID of the user who added or removed the reaction.
          examples:
            - "7m4k9j2p63ynfr8x1qwt5hab4e"
        username:
          type: string
          description: Username of the user.
          examples:
            - "alice"
        emoji_name:
          type: string
          description: Name of the emoji (without colons).
          examples:
            - "thumbsup"

    TestMessage:
      type: object
      description: Payload for the `crossguard_test` message type, used to verify transport connectivity.
      required:
        - id
      properties:
        id:
          type: string
          description: A Mattermost-generated unique identifier for the test request.
          examples:
            - "dj7f8k2m41ygsr9w6pxt3nqb4e"

    # ------------------------------------------------------------------
    # Connection configuration (stored in plugin settings, not on the wire)
    # ------------------------------------------------------------------
    ConnectionConfig:
      type: object
      description: >
        Configuration for a single connection (inbound or outbound).
        Stored in plugin settings as a JSON array. The `provider` field
        determines which nested configuration block is used. Exactly one
        of `nats` or `azure` should be present, matching the provider.
      required:
        - name
        - provider
      properties:
        name:
          type: string
          description: >
            Human-readable connection identifier. Lowercase alphanumeric
            characters and hyphens only.
          pattern: "^[a-z0-9-]+$"
          examples:
            - "high-side"
        provider:
          type: string
          enum:
            - nats
            - azure
          description: >
            Transport provider for this connection. Determines which
            nested configuration block is used and how messages are
            delivered.
          default: "nats"
        file_transfer_enabled:
          type: boolean
          description: >
            Whether file attachment relay is enabled for this connection.
            For NATS, files are stored in a JetStream Object Store bucket.
            For Azure, files are stored in an Azure Blob Storage container.
          default: false
        file_filter_mode:
          type: string
          enum:
            - ""
            - allow
            - deny
          description: >
            File extension filter mode. Empty string means no filtering
            (all files pass). `allow` means only listed extensions are
            relayed. `deny` means listed extensions are blocked.
          default: ""
        file_filter_types:
          type: string
          description: >
            Comma-separated list of file extensions to filter (e.g.
            `.pdf,.docx,.png`). Extensions are case-insensitive and a
            leading dot is optional. Only meaningful when
            `file_filter_mode` is `allow` or `deny`.
          default: ""
          examples:
            - ".pdf,.docx,.png"
        message_format:
          type: string
          enum:
            - json
            - xml
          description: >
            Wire format for outbound messages. Use XML when sending
            through a Cross Domain Solution (CDS). Inbound messages are
            auto-detected regardless of this setting. Only applies to
            outbound connections.
          default: "json"
        nats:
          $ref: "#/components/schemas/NATSProviderConfig"
          description: >
            NATS provider configuration. Required when provider is `nats`.
        azure:
          $ref: "#/components/schemas/AzureProviderConfig"
          description: >
            Azure Queue Storage provider configuration. Required when
            provider is `azure`.

    # ------------------------------------------------------------------
    # NATS provider configuration
    # ------------------------------------------------------------------
    NATSProviderConfig:
      type: object
      description: >
        Configuration fields specific to the NATS transport provider.
        NATS uses push-based pub/sub delivery with optional JetStream
        for file transfer.
      required:
        - address
        - subject
      properties:
        address:
          type: string
          description: NATS server address.
          examples:
            - "nats://nats:4222"
        subject:
          type: string
          description: NATS subject to publish to or subscribe on. Must start with `crossguard.`.
          pattern: "^crossguard\\."
          examples:
            - "crossguard.high"
        tls_enabled:
          type: boolean
          description: Whether TLS is enabled for this connection.
          default: false
        auth_type:
          type: string
          enum:
            - none
            - token
            - credentials
          description: Authentication method for the NATS connection.
          default: "none"
        token:
          type: string
          description: Bearer token (used when auth_type is `token`).
        username:
          type: string
          description: Username (used when auth_type is `credentials`).
        password:
          type: string
          format: password
          description: Password (used when auth_type is `credentials`).
        client_cert:
          type: string
          description: Filesystem path to the client TLS certificate.
        client_key:
          type: string
          description: Filesystem path to the client TLS private key.
        ca_cert:
          type: string
          description: Filesystem path to the CA certificate for server verification.

    # ------------------------------------------------------------------
    # Azure provider configuration
    # ------------------------------------------------------------------
    AzureProviderConfig:
      type: object
      description: >
        Configuration fields specific to the Azure Queue Storage transport
        provider. Azure uses polling-based delivery with a 5-second poll
        interval for queue messages and 15-second poll interval for blob
        files. Queues and blob containers are auto-created on startup if
        they do not exist.
      required:
        - connection_string
        - queue_name
      properties:
        connection_string:
          type: string
          description: >
            Azure Storage account connection string. Contains the account
            name, key, and endpoint information. Treat as a secret.
          examples:
            - "DefaultEndpointsProtocol=https;AccountName=myaccount;AccountKey=...;EndpointSuffix=core.windows.net"
        queue_name:
          type: string
          description: >
            Name of the Azure Queue. Auto-created on provider startup if
            it does not exist. Must follow Azure Queue naming rules
            (lowercase, 3-63 characters, letters/numbers/hyphens).
          examples:
            - "crossguard-relay"
        blob_container_name:
          type: string
          description: >
            Name of the Azure Blob container for file transfer. Required
            when `file_transfer_enabled` is true. Auto-created on startup
            if it does not exist.
          examples:
            - "crossguard-files"

    # ------------------------------------------------------------------
    # NATS file transfer protocol (reference)
    # ------------------------------------------------------------------
    NATSFileTransferProtocol:
      type: object
      description: >
        Documents the JetStream Object Store protocol used for file
        attachment relay on NATS connections. File transfer operates
        independently of the core NATS pub/sub text relay. Text messages
        flow through standard publish/subscribe; files flow through
        JetStream Object Store using the same NATS connection.
      properties:
        bucket:
          type: string
          const: "crossguard-files"
          description: >
            JetStream Object Store bucket name. Auto-created on first use
            via CreateOrUpdateObjectStore.
        ttl:
          type: string
          const: "1h"
          description: >
            Object time-to-live. Objects are automatically purged after
            1 hour. No receiver-side deletion is performed because the
            same object may be consumed by multiple receivers (fan-out).
        object_key_format:
          type: string
          description: >
            Object key format: `{postID}/{randomID}` where postID is the
            Mattermost post ID from the originating server and randomID
            is a generated unique identifier.
          examples:
            - "8swgtrrdiff89yj1z33pofo15r/dj7f8k2m41ygsr9w6pxt3nqb4e"
        metadata_headers:
          type: object
          description: >
            Custom NATS headers set on each uploaded object. The receiving
            instance reads these headers to route and attach the file.
          properties:
            X-Post-Id:
              type: string
              description: >
                The originating server's post ID. Used by the receiver to
                look up the local post via its post ID mapping.
              examples:
                - "8swgtrrdiff89yj1z33pofo15r"
            X-Conn-Name:
              type: string
              description: >
                Name of the connection that uploaded the file. Receivers
                filter objects by this header to process only files from
                the matching connection.
              examples:
                - "high-side"
            X-Filename:
              type: string
              description: >
                Original filename of the attachment as it appeared on the
                sending server.
              examples:
                - "report.pdf"
        max_concurrent_ops:
          type: integer
          const: 32
          description: >
            Maximum concurrent file upload/download operations per plugin
            instance. Separate from the text relay semaphore (256 slots).
        max_file_size:
          type: string
          description: >
            Governed by the Mattermost server's FileSettings.MaxFileSize
            configuration. Default is 100 MB. Files exceeding this limit
            are skipped with a log warning.

    # ------------------------------------------------------------------
    # Azure file transfer protocol (reference)
    # ------------------------------------------------------------------
    AzureFileTransferProtocol:
      type: object
      description: >
        Documents the Azure Blob Storage protocol used for file attachment
        relay on Azure connections. Files are uploaded as blobs with
        metadata headers, then discovered and downloaded by the receiving
        instance via polling (15-second interval). Blobs are deleted after
        successful processing. Unlike NATS Object Store, there is no
        automatic TTL; blobs persist until explicitly deleted or managed
        by Azure lifecycle policies.
      properties:
        container:
          type: string
          description: >
            Azure Blob container name, configured via
            `blob_container_name`. Auto-created on startup if it does
            not exist.
          examples:
            - "crossguard-files"
        blob_key_format:
          type: string
          description: >
            Blob key format: `{postID}/{randomID}`, matching the NATS
            Object Store key format for consistency.
          examples:
            - "8swgtrrdiff89yj1z33pofo15r/dj7f8k2m41ygsr9w6pxt3nqb4e"
        metadata_key:
          type: string
          const: "crossguard_headers"
          description: >
            Blob metadata key that stores file routing headers. The value
            is a Base64-encoded JSON object containing the same header
            fields used by NATS (X-Post-Id, X-Conn-Name, X-Filename).
        metadata_value_format:
          type: object
          description: >
            JSON structure stored (Base64-encoded) in the
            `crossguard_headers` blob metadata key.
          properties:
            headers:
              type: object
              description: Map of header name to value.
              properties:
                X-Post-Id:
                  type: string
                  description: Originating server's post ID.
                X-Conn-Name:
                  type: string
                  description: Connection name that uploaded the file.
                X-Filename:
                  type: string
                  description: Original filename of the attachment.
        poll_interval:
          type: string
          const: "15s"
          description: >
            Interval between blob container list operations. The receiver
            polls for new blobs every 15 seconds.
        cleanup:
          type: string
          description: >
            Blobs are deleted immediately after successful processing by
            the receiver. Failed downloads or handler errors leave the
            blob in place for retry on the next poll cycle. There is no
            automatic TTL; consider Azure Storage lifecycle management
            policies for production deployments.
        max_file_size:
          type: string
          description: >
            Same as NATS: governed by the Mattermost server's
            FileSettings.MaxFileSize configuration. Default is 100 MB.
        message_size_limit:
          type: integer
          const: 48000
          description: >
            Azure Queue Storage has a 64 KB message size limit. Messages
            are Base64-encoded before enqueuing, so the effective payload
            limit is 48,000 bytes. Messages exceeding this limit are
            truncated (text is shortened to fit).
